# Full TeleopSystemConfig, as YAML. Edit this file to change hardware wiring or run
# settings -- no code changes needed. See lerobot_3d.teleop_config for field docs.

# leaders/followers must be the same length (one leader drives one follower,
# matched by list position). realsense_serials needs at least one entry.
leaders:
  - port: /dev/ttyACM0
    id: bender_leader_arm

followers:
  - port: /dev/ttyACM2
    id: gray_follower_arm

realsense_serials:
  - "044322073544"

# Camera extrinsics JSON (cwd, LEROBOT_3D_EXTRINSIC_JSON, or src/ next to package).
extrinsic_json: extrinsic_calibration.json

# Non-empty -> write recordings/<name>/ on shutdown.
recording_name: ""

# null -> bundled so101_new_calib.urdf under the package's calibration/ dir.
urdf_path: null

# Show the viser GUI's Quit/Capture/Save-subgoal controls.
tune: true

# Viser point radius in world-space meters (not pixels) -- e.g. 0.003 = 3mm dots.
point_size: 0.003

# RealSense color/depth stream settings.
camera_width: 848
camera_height: 480
camera_fps: 60

# Seconds to blend from the current command to a new follower target. 0 disables smoothing.
action_interpolation_duration_s: 0.0
# Follower command loop rate while action interpolation is enabled.
action_command_hz: 50.0

# Port for the viser server hosting the scene + robot point clouds and GUI controls.
viser_port: 8080
